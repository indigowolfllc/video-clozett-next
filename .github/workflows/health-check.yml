name: Production Health Check

on:
  schedule:
    - cron: "*/30 * * * *"   # 30分ごと
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check Production URL
        id: check
        run: |
          URL="URL="https://video-clozett-next.vercel.app/api/health"

          RESPONSE=$(curl -o /dev/null -s -w "%{http_code} %{time_total}" --max-time 15 $URL || echo "000 0")
          STATUS=$(echo $RESPONSE | awk '{print $1}')
          TIME=$(echo $RESPONSE | awk '{print $2}')

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT

          if [ "$STATUS" != "200" ]; then
            exit 1
          fi

      - name: Notify Slack on Failure
        if: failure()
        run: |
          STATUS="${{ steps.check.outputs.status }}"
          TIME="${{ steps.check.outputs.time }}"
          URL="https://video-clozett-next.vercel.app/api/health"

          if [[ "$STATUS" == 5* ]]; then
            LEVEL="🚨 CRITICAL (Server Error)"
          elif [[ "$STATUS" == 4* ]]; then
            LEVEL="⚠️ WARNING (Client Error)"
          else
            LEVEL="❌ UNKNOWN ERROR"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"$LEVEL\nVideo CloZett Production Issue\nStatus: $STATUS\nResponse Time: ${TIME}s\nURL: $URL\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
